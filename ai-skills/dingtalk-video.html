<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" href="/favicon.ico" sizes="any">
  <link rel="shortcut icon" href="/favicon.ico">
  <title>钉钉文件上传与播放</title>
  <style>
    :root {
      --bg: linear-gradient(160deg, #eff6ff 0%, #eefaf3 48%, #fff7ea 100%);
      --card: rgba(255, 255, 255, 0.94);
      --border: rgba(20, 63, 104, 0.12);
      --text: #19324a;
      --muted: #607285;
      --primary: #1877f2;
      --accent: #0e9f6e;
      --danger: #c23b4f;
    }

    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Segoe UI", "PingFang SC", sans-serif;
      color: var(--text);
      background: var(--bg);
    }

    .page {
      max-width: 1220px;
      margin: 0 auto;
      padding: 24px 18px 40px;
    }

    .hero, .panel {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 24px;
      box-shadow: 0 18px 50px rgba(20, 63, 104, 0.1);
      backdrop-filter: blur(12px);
    }

    .hero {
      padding: 24px;
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 20px;
      flex-wrap: wrap;
    }

    h1 {
      margin: 0;
      font-size: clamp(28px, 4vw, 42px);
      line-height: 1.1;
    }

    .sub {
      margin: 10px 0 0;
      color: var(--muted);
      line-height: 1.7;
      max-width: 760px;
      font-size: 15px;
    }

    .actions, .row-actions {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    button, .jump {
      border: none;
      border-radius: 999px;
      padding: 12px 18px;
      cursor: pointer;
      font-size: 14px;
      font-weight: 700;
      text-decoration: none;
      transition: transform .16s ease, box-shadow .16s ease, opacity .16s ease;
    }

    button:hover, .jump:hover {
      transform: translateY(-1px);
      box-shadow: 0 10px 22px rgba(20, 63, 104, 0.16);
    }

    button:disabled { opacity: .6; cursor: not-allowed; transform: none; box-shadow: none; }
    .primary { color: #fff; background: linear-gradient(135deg, #1877f2, #0f5fd4); }
    .secondary { color: var(--text); background: #eef4fb; border: 1px solid rgba(24,119,242,.14); }
    .danger { color: #fff; background: linear-gradient(135deg, #cf5061, #b83347); }

    .grid {
      display: grid;
      grid-template-columns: 1.1fr .9fr;
      gap: 20px;
      margin-top: 20px;
    }

    .panel {
      padding: 22px;
    }

    .panel h2 {
      margin: 0 0 14px;
      font-size: 22px;
    }

    .field {
      margin-bottom: 15px;
    }

    label {
      display: block;
      margin-bottom: 8px;
      font-size: 14px;
      font-weight: 700;
    }

    input[type="text"], input[type="file"] {
      width: 100%;
      padding: 14px 16px;
      border-radius: 16px;
      border: 1px solid rgba(20, 63, 104, 0.14);
      background: rgba(255,255,255,.92);
      color: var(--text);
      font-size: 14px;
      outline: none;
    }

    input:focus {
      border-color: rgba(24, 119, 242, .45);
      box-shadow: 0 0 0 4px rgba(24, 119, 242, .08);
    }

    .hint {
      margin-top: 8px;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.6;
    }

    .status {
      margin-top: 16px;
      padding: 16px;
      border-radius: 18px;
      background: #eef6ff;
      border: 1px solid rgba(24, 119, 242, .14);
      line-height: 1.7;
      display: none;
      word-break: break-word;
    }

    .status.error {
      background: #fff2f3;
      border-color: rgba(194, 59, 79, .18);
      color: var(--danger);
    }

    .status.success {
      background: #eefaf4;
      border-color: rgba(14, 159, 110, .18);
    }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      border-radius: 999px;
      padding: 7px 12px;
      font-size: 12px;
      font-weight: 700;
      color: var(--primary);
      background: rgba(24, 119, 242, .12);
    }

    .meta, .space-list {
      display: grid;
      gap: 10px;
      margin-top: 16px;
    }

    .meta-item, .space-item {
      padding: 12px 14px;
      border-radius: 14px;
      background: rgba(245,249,253,.96);
      border: 1px solid rgba(20,63,104,.08);
      font-size: 13px;
      line-height: 1.6;
      word-break: break-word;
    }

    .meta-item strong { display: inline-block; min-width: 96px; }

    video {
      width: 100%;
      max-height: 470px;
      border-radius: 18px;
      background: #07131f;
      box-shadow: 0 18px 44px rgba(7, 19, 31, .24);
    }

    .empty {
      min-height: 240px;
      border-radius: 18px;
      border: 1px dashed rgba(20,63,104,.18);
      background: rgba(247, 250, 253, .88);
      color: var(--muted);
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 16px;
      line-height: 1.8;
    }

    code {
      font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      background: rgba(24, 119, 242, .08);
      border-radius: 6px;
      padding: 2px 6px;
    }

    @media (max-width: 960px) {
      .grid { grid-template-columns: 1fr; }
      .hero, .panel { border-radius: 20px; padding: 18px; }
      .page { padding: 18px 14px 28px; }
    }
  </style>
</head>
<body>
  <div class="page">
    <section class="hero">
      <div>
        <h1>钉钉文件上传与临时播放</h1>
        <p class="sub">
          页面会先拿钉钉上传签名，把文件直传到存储，再调用提交接口生成文件记录。播放时会重新获取临时下载信息，
          通过本地代理转成浏览器能直接播放的链接。
        </p>
      </div>
      <div class="actions">
        <a class="jump secondary" href="/simple-upload.html">返回主工具</a>
        <button class="danger" type="button" onclick="logout()">退出登录</button>
      </div>
    </section>

    <div class="grid">
      <section class="panel">
        <h2>上传到钉盘</h2>
        <div id="configBadge" class="badge">正在读取钉钉配置</div>

        <form id="uploadForm">
          <div class="field">
            <label for="userId">员工 UserID</label>
            <input id="userId" type="text" value="082700020526558725" placeholder="请输入员工 UserID">
            <div class="hint">可通过 UserID 自动换取 <code>unionId</code>。当前已预填：朱道标。</div>
          </div>

          <div class="field">
            <label for="unionId">unionId</label>
            <input id="unionId" type="text" placeholder="请输入钉钉用户 unionId" required>
            <div class="hint">钉盘上传和获取临时下载信息通常都需要用户身份维度的 <code>unionId</code>。</div>
          </div>

          <div class="row-actions">
            <button class="secondary" type="button" onclick="resolveUser()">通过 UserID 获取 unionId</button>
            <button class="secondary" type="button" onclick="createStorageSpace()">创建存储空间</button>
            <button class="secondary" type="button" onclick="createUploadFolder()">创建上传目录</button>
            <button class="secondary" type="button" onclick="loadSpaces()">读取我的空间列表</button>
          </div>

          <div id="spaceList" class="space-list" style="display:none;"></div>

          <div class="field">
            <label for="spaceId">spaceId</label>
            <input id="spaceId" type="text" placeholder="例如从上方空间列表回填">
          </div>

          <div class="field">
            <label for="parentDentryUuid">parentDentryUuid</label>
            <input id="parentDentryUuid" type="text" placeholder="上传目标文件夹的 dentryUuid">
            <div class="hint">这里是要上传到哪个文件夹。现在支持下方目录浏览器直接回填。</div>
          </div>

          <div class="row-actions">
            <button class="secondary" type="button" onclick="browseDirectory()">浏览当前目录</button>
          </div>

          <div id="folderList" class="space-list" style="display:none;"></div>

          <div class="field">
            <label for="fileInput">选择文件</label>
            <input id="fileInput" type="file" required>
          </div>

          <div class="field">
            <label for="customName">文件名（可选）</label>
            <input id="customName" type="text" placeholder="留空则使用原文件名">
          </div>

          <div class="row-actions">
            <button id="uploadBtn" class="primary" type="submit">开始上传</button>
            <button class="secondary" type="button" onclick="clearUpload()">清空</button>
          </div>
        </form>

        <div id="statusBox" class="status"></div>
        <div id="uploadMeta" class="meta" style="display:none;"></div>
      </section>

      <section class="panel">
        <h2>获取临时播放并预览</h2>

        <div class="field">
          <label for="playUnionId">unionId</label>
          <input id="playUnionId" type="text" placeholder="默认沿用上传区域的 unionId">
        </div>

        <div class="field">
          <label for="playSpaceId">spaceId</label>
          <input id="playSpaceId" type="text" placeholder="默认沿用上传结果的 spaceId">
        </div>

        <div class="field">
          <label for="playDentryId">dentryId</label>
          <input id="playDentryId" type="text" placeholder="上传成功后会自动回填">
        </div>

        <div class="row-actions">
          <button class="primary" type="button" onclick="loadPlaybackInfo()">获取临时播放链接</button>
          <button class="secondary" type="button" onclick="copyPlaybackUrl()">复制播放代理链接</button>
        </div>

        <div id="playMeta" class="meta" style="display:none;"></div>
        <video id="player" controls playsinline preload="metadata" style="display:none;"></video>
        <div id="emptyState" class="empty">
          上传完成后会自动回填并尝试播放。<br>
          也可以直接手动输入已有的 <code>spaceId</code> 和 <code>dentryId</code>。
        </div>
      </section>
    </div>
  </div>

  <script>
    if (localStorage.getItem('isLoggedIn') !== 'true') {
      window.location.href = '/login.html';
    }

    let currentPlaybackProxyUrl = '';
    let currentFolderParentId = '0';

    function logout() {
      localStorage.removeItem('isLoggedIn');
      window.location.href = '/login.html';
    }

    function escapeHtml(value) {
      return String(value || '')
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#39;');
    }

    function setStatus(message, type = 'info') {
      const el = document.getElementById('statusBox');
      el.innerHTML = message;
      el.className = `status ${type === 'error' ? 'error' : type === 'success' ? 'success' : ''}`.trim();
      el.style.display = 'block';
    }

    function showMeta(id, items) {
      const el = document.getElementById(id);
      el.style.display = 'grid';
      el.innerHTML = items.map(item => `<div class="meta-item"><strong>${item.label}</strong>${item.value}</div>`).join('');
    }

    async function fetchJson(url, options) {
      const response = await fetch(url, options);
      const data = await response.json().catch(() => ({}));
      if (!response.ok) {
        const extraScopes = Array.isArray(data.requiredScopes) && data.requiredScopes.length
          ? `；缺少权限: ${data.requiredScopes.join(', ')}`
          : '';
        throw new Error((data.error || `请求失败: ${response.status}`) + extraScopes);
      }
      return data;
    }

    async function loadConfig() {
      try {
        const config = await fetchJson('/api/dingtalk/config');
        const el = document.getElementById('configBadge');
        if (config.configured) {
          el.textContent = `已配置 ${config.clientIdMasked} / AgentId ${config.agentId}`;
        } else {
          el.textContent = '未配置钉钉应用参数';
        }
      } catch (error) {
        document.getElementById('configBadge').textContent = `配置读取失败: ${error.message}`;
      }
    }

    async function resolveUser() {
      const userId = document.getElementById('userId').value.trim();
      if (!userId) {
        setStatus('请先填写员工 UserID。', 'error');
        return;
      }

      try {
        setStatus('正在通过 UserID 获取 unionId...');
        const result = await fetchJson('/api/dingtalk/resolve-user', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ userId })
        });
        document.getElementById('unionId').value = result.unionId || '';
        document.getElementById('playUnionId').value = result.unionId || '';
        showMeta('uploadMeta', [
          { label: '姓名', value: escapeHtml(result.name || '-') },
          { label: 'userId', value: escapeHtml(result.userId || userId) },
          { label: 'unionId', value: escapeHtml(result.unionId || '-') },
          { label: '职位', value: escapeHtml(result.title || '-') }
        ]);
        setStatus(`已解析用户 ${escapeHtml(result.name || '')} 的 unionId。`, 'success');
      } catch (error) {
        setStatus(`获取 unionId 失败：${escapeHtml(error.message)}`, 'error');
      }
    }

    async function loadSpaces() {
      const unionId = document.getElementById('unionId').value.trim();
      if (!unionId) {
        setStatus('请先填写 unionId，再读取空间列表。', 'error');
        return;
      }

      try {
        setStatus('正在读取钉钉空间列表...');
        const result = await fetchJson('/api/dingtalk/spaces', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ unionId, spaceType: 'org' })
        });

        const list = result.items || result.spaces || [];
        const box = document.getElementById('spaceList');
        box.style.display = 'grid';
        if (!list.length) {
          box.innerHTML = '<div class="space-item">当前没有读取到空间列表。</div>';
          return;
        }

        box.innerHTML = list.map(item => {
          const spaceId = item.spaceId || item.id || '';
          const title = item.spaceName || item.name || '未命名空间';
          return `
            <div class="space-item">
              <div><strong>${escapeHtml(title)}</strong></div>
              <div>spaceId: <code>${escapeHtml(spaceId)}</code></div>
              <div>类型: ${escapeHtml(item.spaceType || item.type || '-')}</div>
              <div style="margin-top:8px;">
                <button class="secondary" type="button" onclick="pickSpace('${escapeHtml(spaceId)}')">使用这个空间</button>
              </div>
            </div>
          `;
        }).join('');
        setStatus('空间列表读取完成。', 'success');
      } catch (error) {
        setStatus(`读取空间失败：${escapeHtml(error.message)}`, 'error');
      }
    }

    async function createStorageSpace() {
      const unionId = document.getElementById('unionId').value.trim();
      if (!unionId) {
        setStatus('请先获取 unionId，再创建存储空间。', 'error');
        return;
      }

      try {
        setStatus('正在创建钉钉存储空间...');
        const result = await fetchJson('/api/dingtalk/create-space', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            unionId,
            name: `视频空间-${new Date().toISOString().slice(0, 10)}`,
            scene: 'USER',
            sceneId: 'codexuser'
          })
        });

        const space = result.space || result;
        const spaceId = space.spaceId || space.id || '';
        if (spaceId) {
          pickSpace(spaceId);
        }
        showMeta('uploadMeta', [
          { label: 'spaceId', value: escapeHtml(spaceId || '-') },
          { label: '空间名称', value: escapeHtml(space.spaceName || space.name || '-') },
          { label: '空间类型', value: escapeHtml(space.spaceType || space.scene || '-') }
        ]);
        setStatus('存储空间创建成功。', 'success');
      } catch (error) {
        setStatus(`创建存储空间失败：${escapeHtml(error.message)}`, 'error');
      }
    }

    async function createUploadFolder() {
      const unionId = document.getElementById('unionId').value.trim();
      const spaceId = document.getElementById('spaceId').value.trim();
      if (!unionId || !spaceId) {
        setStatus('请先准备好 unionId 和 storage spaceId。', 'error');
        return;
      }

      try {
        setStatus('正在创建上传目录...');
        const result = await fetchJson('/api/dingtalk/create-folder', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            unionId,
            spaceId,
            parentId: '0',
            name: `上传目录-${new Date().toISOString().slice(0, 19).replace(/[:T]/g, '-')}`
          })
        });

        const dentry = result.dentry || {};
        const folderId = dentry.uuid || dentry.id || '';
        document.getElementById('parentDentryUuid').value = folderId;
        setStatus(`上传目录已创建，目录ID：<code>${escapeHtml(folderId)}</code>`, 'success');
        showMeta('uploadMeta', [
          { label: 'spaceId', value: escapeHtml(spaceId) },
          { label: '目录名称', value: escapeHtml(dentry.name || '-') },
          { label: '目录ID', value: escapeHtml(folderId || '-') }
        ]);
      } catch (error) {
        setStatus(`创建目录失败：${escapeHtml(error.message)}`, 'error');
      }
    }

    function pickSpace(spaceId) {
      document.getElementById('spaceId').value = spaceId;
      document.getElementById('playSpaceId').value = spaceId;
      currentFolderParentId = '0';
      document.getElementById('parentDentryUuid').value = '0';
      setStatus(`已回填 spaceId：<code>${escapeHtml(spaceId)}</code>`, 'success');
    }

    async function browseDirectory(parentId = null) {
      const unionId = document.getElementById('unionId').value.trim();
      const spaceId = document.getElementById('spaceId').value.trim();
      const effectiveParentId = (parentId == null ? (document.getElementById('parentDentryUuid').value.trim() || currentFolderParentId || '0') : parentId) || '0';

      if (!unionId || !spaceId) {
        setStatus('浏览目录前需要先确定 unionId 和 spaceId。', 'error');
        return;
      }

      try {
        setStatus(`正在读取目录 ${escapeHtml(effectiveParentId)} ...`);
        const result = await fetchJson('/api/dingtalk/files', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ unionId, spaceId, parentId: effectiveParentId, maxResults: 100 })
        });

        currentFolderParentId = effectiveParentId;
        document.getElementById('parentDentryUuid').value = effectiveParentId;
        const box = document.getElementById('folderList');
        const list = result.items || result.files || [];
        box.style.display = 'grid';

        const nav = `
          <div class="space-item">
            <div><strong>当前目录</strong>: <code>${escapeHtml(effectiveParentId)}</code></div>
            <div style="margin-top:8px;" class="row-actions">
              <button class="secondary" type="button" onclick="useCurrentDirectory()">选中当前目录</button>
              <button class="secondary" type="button" onclick="browseDirectory('0')">回到根目录</button>
            </div>
          </div>
        `;

        if (!list.length) {
          box.innerHTML = nav + '<div class="space-item">当前目录下没有读取到子项。</div>';
          setStatus('目录读取完成。', 'success');
          return;
        }

        box.innerHTML = nav + list.map(item => {
          const itemId = item.id || item.fileId || item.dentryId || '';
          const itemName = item.name || item.fileName || item.title || '未命名';
          const isFolder = item.type === 'folder' || item.fileType === 'folder' || item.extension === 'folder';
          return `
            <div class="space-item">
              <div><strong>${isFolder ? '目录' : '文件'}</strong>: ${escapeHtml(itemName)}</div>
              <div>ID: <code>${escapeHtml(itemId)}</code></div>
              <div>类型: ${escapeHtml(item.type || item.fileType || '-')}</div>
              <div style="margin-top:8px;" class="row-actions">
                ${isFolder ? `<button class="secondary" type="button" onclick="browseDirectory('${escapeHtml(itemId)}')">进入目录</button>` : ''}
                ${isFolder ? `<button class="secondary" type="button" onclick="pickDirectory('${escapeHtml(itemId)}', '${escapeHtml(itemName)}')">选此目录</button>` : ''}
              </div>
            </div>
          `;
        }).join('');
        setStatus('目录读取完成。', 'success');
      } catch (error) {
        const message = String(error.message || '');
        if (message.includes('Drive.File.Read')) {
          setStatus(`目录读取失败：当前应用还未开通 <code>Drive.File.Read</code> 权限，请先到钉钉开放平台开通后再试。`, 'error');
        } else {
          setStatus(`目录读取失败：${escapeHtml(message)}`, 'error');
        }
      }
    }

    function pickDirectory(dentryId, name) {
      document.getElementById('parentDentryUuid').value = dentryId;
      setStatus(`已选择上传目录：${escapeHtml(name)}，dentryUuid 为 <code>${escapeHtml(dentryId)}</code>`, 'success');
    }

    function useCurrentDirectory() {
      const current = document.getElementById('parentDentryUuid').value.trim() || currentFolderParentId || '0';
      document.getElementById('parentDentryUuid').value = current;
      setStatus(`已选中当前目录：<code>${escapeHtml(current)}</code>`, 'success');
    }

    function clearUpload() {
      document.getElementById('uploadForm').reset();
      document.getElementById('uploadMeta').style.display = 'none';
      setStatus('已清空上传表单。');
    }

    function setUploadLoading(loading) {
      const btn = document.getElementById('uploadBtn');
      btn.disabled = loading;
      btn.textContent = loading ? '上传中...' : '开始上传';
    }

    function renderPlayer(url, playMetaItems) {
      currentPlaybackProxyUrl = url;
      const player = document.getElementById('player');
      const empty = document.getElementById('emptyState');
      player.src = url;
      player.style.display = 'block';
      empty.style.display = 'none';
      showMeta('playMeta', playMetaItems);
    }

    async function loadPlaybackInfo() {
      const unionId = document.getElementById('playUnionId').value.trim() || document.getElementById('unionId').value.trim();
      const spaceId = document.getElementById('playSpaceId').value.trim() || document.getElementById('spaceId').value.trim();
      const dentryId = document.getElementById('playDentryId').value.trim();

      if (!unionId || !spaceId || !dentryId) {
        setStatus('播放前需要 unionId、spaceId、dentryId。', 'error');
        return;
      }

      try {
        setStatus('正在获取钉钉临时播放信息...');
        const result = await fetchJson('/api/dingtalk/playback-info', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ unionId, spaceId, dentryId })
        });

        const proxyUrl = result.playbackProxyUrl;
        renderPlayer(proxyUrl, [
          { label: 'unionId', value: escapeHtml(unionId) },
          { label: 'spaceId', value: escapeHtml(spaceId) },
          { label: 'dentryId', value: escapeHtml(dentryId) },
          { label: '代理播放', value: `<a href="${escapeHtml(proxyUrl)}" target="_blank" rel="noreferrer">${escapeHtml(proxyUrl)}</a>` },
          { label: '预览页', value: result.previewUrl ? `<a href="${escapeHtml(result.previewUrl)}" target="_blank" rel="noreferrer">${escapeHtml(result.previewUrl)}</a>` : '未返回' }
        ]);
        setStatus('已获取临时播放信息并开始加载视频。', 'success');
      } catch (error) {
        setStatus(`获取播放信息失败：${escapeHtml(error.message)}`, 'error');
      }
    }

    async function copyPlaybackUrl() {
      if (!currentPlaybackProxyUrl) {
        setStatus('当前还没有可复制的播放链接。', 'error');
        return;
      }

      try {
        await navigator.clipboard.writeText(currentPlaybackProxyUrl);
        setStatus('代理播放链接已复制。', 'success');
      } catch (error) {
        setStatus(`复制失败，请手动复制：${escapeHtml(currentPlaybackProxyUrl)}`, 'error');
      }
    }

    document.getElementById('uploadForm').addEventListener('submit', async (event) => {
      event.preventDefault();
      const unionId = document.getElementById('unionId').value.trim();
      const spaceId = document.getElementById('spaceId').value.trim();
      const parentDentryUuid = document.getElementById('parentDentryUuid').value.trim();
      const customName = document.getElementById('customName').value.trim();
      const fileInput = document.getElementById('fileInput');

      if (!fileInput.files.length) {
        setStatus('请选择一个文件。', 'error');
        return;
      }

      setUploadLoading(true);
      try {
        const formData = new FormData();
        formData.append('file', fileInput.files[0], customName || fileInput.files[0].name);
        formData.append('unionId', unionId);
        formData.append('spaceId', spaceId);
        formData.append('parentDentryUuid', parentDentryUuid);
        if (customName) formData.append('name', customName);

        setStatus('正在向钉钉申请上传签名并上传文件...');
        const result = await fetchJson('/api/dingtalk/upload', {
          method: 'POST',
          body: formData
        });

        const dentryId = result.dentryId || '';
        document.getElementById('playUnionId').value = unionId;
        document.getElementById('playSpaceId').value = spaceId;
        document.getElementById('playDentryId').value = dentryId;

        showMeta('uploadMeta', [
          { label: 'spaceId', value: escapeHtml(spaceId) },
          { label: 'dentryId', value: escapeHtml(dentryId || '-') },
          { label: '文件名', value: escapeHtml(result.dentryName || result.name || customName || fileInput.files[0].name) },
          { label: '代理播放', value: result.playbackProxyUrl ? `<a href="${escapeHtml(result.playbackProxyUrl)}" target="_blank" rel="noreferrer">${escapeHtml(result.playbackProxyUrl)}</a>` : '待生成' }
        ]);
        setStatus('上传完成，正在准备播放信息...', 'success');

        if (dentryId) {
          await loadPlaybackInfo();
        }
      } catch (error) {
        setStatus(`上传失败：${escapeHtml(error.message)}`, 'error');
      } finally {
        setUploadLoading(false);
      }
    });

    loadConfig();
    resolveUser();
  </script>
</body>
</html>
