<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <linearGradient id="g" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#4CAF50" />
      <stop offset="1" stop-color="#2E7D32" />
    </linearGradient>
  </defs>
  <!-- 背景圆角矩形 -->
  <rect width="64" height="64" rx="10" fill="url(#g)" />

  <!-- 白色箱子图标 -->
  <g transform="translate(8,12)">
    <!-- 盒子主体 -->
    <rect x="8" y="16" width="40" height="22" rx="2" fill="#ffffff" />
    <!-- 盒子顶盖（稍微倾斜的菱形/翻盖） -->
    <polygon points="8,16 32,4 56,16 32,26" fill="#ffffff" opacity="0.95" />
    <!-- 顶部中线分割，增加立体感 -->
    <rect x="30" y="6" width="4" height="20" fill="#4CAF50" opacity="0.12" />
    <!-- 箱子开口阴影 -->
    <polygon points="32,26 56,16 44,16 32,24 20,16 8,16" fill="#000000" opacity="0.06" />
  </g>
</svg>
