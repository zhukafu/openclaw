version: '3.8'

services:
  app:
    build: .
    container_name: aliyun-package-app
    ports:
      - "801:801"   # 代理服务端口（proxy-server.js）
      - "8080:8080" # 简单静态服务器（server.js）
    environment:
      - PORT=801
    # 推荐使用命名卷，避免主机目录权限导致容器内非 root 用户无法写入
    volumes:
      - uploads:/usr/src/app/uploads
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:801/ || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3

volumes:
  uploads:
    driver: local
